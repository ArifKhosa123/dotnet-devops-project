name: .NET 10 CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore ./DevOpsApi/DevOpsApi.csproj

    - name: Build
      run: dotnet build ./DevOpsApi/DevOpsApi.csproj --no-restore

    - name: Test
      run: dotnet test ./DevOpsApi/DevOpsApi.csproj --no-build --verbosity normal