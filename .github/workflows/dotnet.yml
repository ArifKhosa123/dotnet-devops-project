name: .NET CI

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore DevOpsApi/DevOpsApi.csproj

    - name: Build
      run: dotnet build DevOpsApi/DevOpsApi.csproj --no-restore

    - name: Test
      run: dotnet test DevOpsApi/DevOpsApi.csproj --no-build